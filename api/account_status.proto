edition = "2024";

package account;//this is the proto package name,all proto in this project must use this name as the proto package name
//this is the golang's package name,all proto in this project must use this name as the golang's package name
option go_package="github.com/chenjie199234/account/api;api";
//all other imports should put before this line
//all pbex options on response will not be checked automatically
//https://github.com/chenjie199234/Corelib/blob/main/pbex/pbex.proto
import option "pbex/pbex.proto";

//this is the proto file for status service
service Status{
	//ping check server's health
	rpc Ping(Pingreq)returns(Pingresp){
		option (pbex.method)="get";
		option (pbex.method)="crpc";
		option (pbex.method)="grpc";
	}
}
//req can be set with pbex extentions
message Pingreq{
	int64 timestamp=1[(pbex.int_gt)=0];
}
//resp's pbex extentions will be ignore
message Pingresp{
	int64 client_timestamp=1;
	int64 server_timestamp=2;
	string host=3;
	string ip=4;
	double cpu_num=5;
	double cpu_usage=6;
	string cpu_type=7;
	uint64 mem_total=8;
	double mem_usage=9;
	string mem_type=10;
	string version=11;
}
